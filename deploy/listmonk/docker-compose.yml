services:
  db:
    image: postgres:16
    container_name: listmonk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-listmonk}
      POSTGRES_USER: ${POSTGRES_USER:-listmonk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: listmonk/listmonk:latest
    container_name: listmonk-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-admin}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:?Set LISTMONK_ADMIN_PASSWORD in .env}
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__host: db
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER:-listmonk}
      LISTMONK_db__password: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      LISTMONK_db__database: ${POSTGRES_DB:-listmonk}
      LISTMONK_db__ssl_mode: disable
    volumes:
      - ./config.toml:/listmonk/config.toml:ro
    command:
      - sh
      - -c
      - >-
        ./listmonk --install --idempotent --yes --config /listmonk/config.toml &&
        ./listmonk --upgrade --yes --config /listmonk/config.toml &&
        ./listmonk --config /listmonk/config.toml

volumes:
  postgres-data:
